# Pre-commit hook configurations for website-processor toolchain
# See https://pre-commit.com for more information

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml

  - repo: https://github.com/google/yapf
    rev: v0.40.2
    hooks:
      - id: yapf
        args: ['--style', '{based_on_style: google, indent_width: 2, column_limit: 80}', '-i']

  - repo: local
    hooks:
      - id: run-tests
        name: Run Python unit tests
        entry: make test
        language: system
        files: '\.py$'
        pass_filenames: false
